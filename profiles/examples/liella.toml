[transcribe]
vocab = [
    # --- Group & Sub-Units ---
    "Liella!",
    "CatChu!",
    "KALEIDOSCORE",
    "5yncri5e!",

    # --- Cast Members (Seiyuu) ---
    "伊達さゆり", # Date Sayuri
    "Liyuu",
    "岬なこ", # Misaki Nako
    "ペイトン尚未", # Payton Naomi
    "青山なぎさ", # Aoyama Nagisa
    "鈴原希実", # Suzuhara Nozomi
    "薮島朱音", # Yabushima Akane
    "大熊和奏", # Ookuma Wakana
    "絵森彩", # Emori Aya
    "結那", # Yuina
    "坂倉花", # Sakakura Sakura

    # --- Characters ---
    "澁谷かのん",
    "唐可可",
    "嵐千砂都",
    "平安名すみれ",
    "葉月恋",
    "桜小路きな子",
    "米女メイ",
    "若菜四季",
    "鬼塚夏美",
    "ウィーン・マルガレーテ",
    "鬼塚冬毬",

    # --- Program & Current Tour (2026) ---
    "リエラジ", # Liella! Radio
    "生配信", # Livestream
    "チュトリエラ", # TUTOLiella!! (Current variety show)
    "Fly! MUSIC WORLD", # 7th Live Title
    "結ヶ丘女子高等学校", # Yuigaoka Girls' High School

    # --- Cast Nicknames ---
    "さゆりん", # Sayurin (Date Sayuri)
    "さくちゃん", # Sakuchan (Sakakura Sakura)
    "えもりん", # Emorin (Emori Aya)
    "ペイちゃん", # Paychan (Aoyama Nagisa)
    "なこちゃん", # Nakochan (Konoe Nako)
    "なぎちゃん", # Nagichan (Okuyama Nagi)
    "のんちゃん", # Nonchan (Suzuhara Nozomi)
    "くまちゃん", # Kumachan (Okuma Wakana)

    # --- Catchphrases & Verbal Tics ---
    "ギャラクシー", # Galaxy (Sumire)
    "〜っす", # -ssu (Kinako's verbal tic)
    "オニナッツ", # Oninatsu (Natsumi's nickname/catchphrase)
    "マニー", # Money (Natsumi)
    "ワンダフォー", # Wonderful (Wien's pronunciation)
    "おいっす", # Oissu (Common greeting)
    "ういっす", # Uissu

    # --- General Livestream Terms ---
    "スクスタ", # SIFAS (General franchise term)
    "ラブライブ！スーパースター!!",
    "ハッシュタグ",
    "メール",
    "お便り",
    "告知", # Announcement
]

[translate]
prompt = "prompts/liella.md"

[format.normalizer]
engine = "llm"
provider = "google-vertex"
model = "gemini-3.1-flash-lite-preview"
reasoning_effort = "minimal"
allow_llm_correction = true

# --- VA Names ---

[[format.normalizer.terms]]
value = "伊達さゆり"
explanation = "VA name (Date Sayuri). Extremely error-prone. ASR variants: 立石りか, 依佑璃さゆり, 歌田鈴奈, 依達さゆり, 楯さゆり, 達さゆり."

[[format.normalizer.terms]]
value = "坂倉花"
explanation = "VA name (Sakakura Sakura). ASR variants: 策倉さくら, 咲倉咲, 策倉桜."

[[format.normalizer.terms]]
value = "薮島朱音"
explanation = "VA name (Yabushima Akane). ASR variants: 藪縞あかね, 藪2茜, 藪島かの, 藪島あかり."

[[format.normalizer.terms]]
value = "大熊和奏"
explanation = "VA name (Ookuma Wakana). ASR variants: 大熊のちゃん (name truncated), 大熊若菜."

[[format.normalizer.terms]]
value = "さゆりん"
explanation = "Nickname for Date Sayuri. ASR variants: せいりん, さえりん."

# --- Character Names ---

[[format.normalizer.terms]]
value = "米女メイ"
explanation = "Character name (Yoneme Mei). ASR uses wrong kanji for メイ: 米女芽衣, 米女命, 米めい, 米芽めい."

[[format.normalizer.terms]]
value = "渋谷かのん"
explanation = "Character name. ASR sometimes drops the ん, producing 渋谷かの."
