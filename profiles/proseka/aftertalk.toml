[glossary]
"プロセカ" = "ProSeka"
"アフタートーク" = "AfterTalk"
"アフターライブ" = "AfterLive"
"セカイ" = "SEKAI"
"断片セカイ" = "Fragment SEKAI"
"バーチャルシンガー" = "Virtual Singer"
"ファンフェスタ" = "fan festa"
"ワンダーホイ" = "Wonderhoi!"
"レオニ" = "Leoni"
"ニーゴ" = "Niigo"
"ビビバス" = "Vivibasu"
"ワンダショ" = "Wandasho"
"モモジャン" = "Momojan"
"宮益坂女子学園" = "Miyamasuzaka Girls Academy"
